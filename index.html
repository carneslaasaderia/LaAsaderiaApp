<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La Asadería - Buscador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      background: #f5f5f5;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .item {
      margin-top: 10px;
      padding: 15px;
      border-radius: 10px;
      background: white;
    }

    .nombre { font-weight: bold; }
    .precio { color: green; font-size: 18px; }
    .codigo { color: gray; font-size: 14px; }
  </style>
</head>

<body>

<h2>Buscar producto</h2>
<input type="text" id="search" placeholder="Ej: molida, asiento, 34">

<div id="results"></div>

<script>
let productos = [];

// Cargar JSON
fetch('productos.json?v=' + Date.now())
  .then(res => res.json())
  .then(data => {
    productos = data;
    console.log("OK JSON:", productos);
  })
  .catch(err => console.error("ERROR JSON:", err));

// Formato CLP
function formatoCLP(valor) {
  return new Intl.NumberFormat('es-CL').format(valor);
}

// Normalizar texto
function normalizar(texto) {
  return texto
    .toString()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

// Evento búsqueda
document.getElementById('search').addEventListener('input', function() {

  let texto = normalizar(this.value);

  // 🔴 IMPORTANTE: si no hay texto, no mostrar nada
  if (!texto) {
    document.getElementById('results').innerHTML = "";
    return;
  }

  let resultados = productos
    .slice(1) // quitar encabezado
    .filter(p => {
      let nombre = normalizar(p.A);
      let codigo = normalizar(p.B);

      return nombre.includes(texto) || codigo.includes(texto);
    });

  console.log("RESULTADOS:", resultados);

  let html = "";

  resultados.forEach(p => {
    html += `
      <div class="item">
        <div class="nombre">${p.A}</div>
        <div class="codigo">Código: ${p.B}</div>
        <div class="precio">$${formatoCLP(Number(p.C))}</div>
      </div>
    `;
  });

  document.getElementById('results').innerHTML =
    html || "<p>No se encontraron resultados</p>";
});
</script>

</body>
</html>
