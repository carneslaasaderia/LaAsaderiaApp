<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La Asadería - Buscador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      background: #f2f2f2;
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .item {
      margin-bottom: 12px;
      padding: 16px;
      border-radius: 14px;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .item:active {
      transform: scale(0.98);
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .nombre {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .codigo {
      font-size: 13px;
      color: #888;
    }

    .precio {
      font-size: 22px;
      font-weight: bold;
      color: #1a7f37;
      margin-top: 8px;
    }

    .empty {
      text-align: center;
      margin-top: 20px;
      color: #777;
    }
  </style>
</head>

<body>

<h2>🔎 Buscar producto</h2>
<input type="text" id="search" placeholder="Ej: molida, asiento, 34">

<div id="results"></div>

<script>
let productos = [];

fetch('productos.json?v=' + Date.now())
  .then(res => res.json())
  .then(data => productos = data);

function formatoCLP(v) {
  return new Intl.NumberFormat('es-CL').format(v);
}

function normalizar(t) {
  return (t || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

document.getElementById('search').addEventListener('input', function() {

  let texto = normalizar(this.value);

  if (!texto) {
    results.innerHTML = "";
    return;
  }

  let resultados = productos
    .slice(1)
    .filter(p => {
      let nombre = normalizar(p.A);
      let codigo = normalizar(p.B);
      return nombre.includes(texto) || codigo.includes(texto);
    })
    .slice(0, 15);

  results.innerHTML = resultados.map(p => `
    <div class="item">
      <div class="nombre">${p.A}</div>
      <div class="codigo">Código: ${p.B}</div>
      <div class="precio">$${formatoCLP(Number(p.C))}</div>
    </div>
  `).join("") || `<div class="empty">No se encontraron resultados</div>`;
});
</script>

</body>
</html>
